<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearty</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="wind-sound" loop>
        <source src="windy.mp3" type="audio/mpeg">
    </audio>

    <audio id="heartbeat-sound" loop>
        <source src="heartbeat.wav" type="audio/wav">
    </audio>

    <audio id="frozen-song" loop>
        <source src="frozen.mp3" type="audio/mpeg">
    </audio>
    

    <button id="bilqis-invert" class="tiny-btn">change</button>

    <div class="toggle-container">
        <span class="label">Pinky</span>
        <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider round"></span>
        </label>
        <span class="label">Goth</span>

        <span class="label" style="margin-left: 40px;">Bilqis</span>
        <label class="switch">
            <input type="checkbox" id="bilqis-toggle">
            <span class="slider round bilqis-slider"></span>
        </label>
    </div>

    <div class="heart-container" id="heart">
        <div class="heart"></div>
    </div>

    <div id="secret-message"></div>

    <div id="death-screen">
        <div class="death-content">
            <h1>died of.....flirty cause 😏💐</h1>
            <button onclick="resetGame()">Go back</button>
        </div>
    </div>

    <div class="decorations pinky-decorations">
        <div class="mini-heart h1"></div>
        <div class="mini-heart h2"></div>
        <div class="mini-heart h3"></div>
        <div class="mini-heart h4"></div>
        <div class="mini-heart h5"></div>
        <div class="mini-heart h6"></div>
         <div class="mini-heart h1"></div>
        <div class="mini-heart h2"></div>
        <div class="mini-heart h3"></div>
        <div class="mini-heart h4"></div>
        <div class="mini-heart h5"></div>
        <div class="mini-heart h6"></div>
    </div>

    <div class="decorations goth-decorations">
        <svg class="web web-left" viewBox="0 0 100 100">
            <path d="M0,0 L100,0 M0,0 L80,40 M0,0 L40,80 M0,0 L0,100" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
            <path d="M20,0 Q20,20 0,20 M40,0 Q40,40 0,40 M60,0 Q60,60 0,60 M80,0 Q80,80 0,80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        </svg>
        
        <svg class="web web-right" viewBox="0 0 100 100">
            <path d="M100,100 L0,100 M100,100 L20,60 M100,100 L60,20 M100,100 L100,0" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
            <path d="M100,80 Q80,80 80,100 M100,60 Q60,60 60,100 M100,40 Q40,40 40,100 M100,20 Q20,20 20,100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
        </svg>

        <div class="spider-hanger">
            <div class="thread"></div>
            <svg class="spider" viewBox="0 0 24 24" width="28px" height="28px">
                <circle cx="12" cy="14" r="4.5" fill="#ffffff" />
                <circle cx="12" cy="8" r="2.5" fill="#ffffff" />
                <path d="M10 8 L5 4 M14 8 L19 4 M9 10 L3 9 M15 10 L21 9 M9 13 L4 15 M15 13 L20 15 M10 16 L7 21 M14 16 L17 21" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
